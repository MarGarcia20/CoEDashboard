name: Refresh CoE Dashboard

on:
  # Run every 2 hours during ET business hours (8am–6pm), Mon–Fri.
  # Two UTC cron windows cover EDT (summer) and EST (winter); the job
  # checks the actual ET hour and only proceeds inside the work window.
  schedule:
    - cron: '7 12-22/2 * * 1-5'   # EDT window: 8am, 10am, 12pm, 2pm, 4pm, 6pm ET
    - cron: '7 13-23/2 * * 1-5'   # EST window: 8am, 10am, 12pm, 2pm, 4pm, 6pm ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check Eastern Time is in business window
        id: et_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — proceeding regardless of ET hour."
            echo "run=yes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          et_hour=$(TZ=America/New_York date +%H)
          echo "Current Eastern Time hour: $et_hour"
          # Allowed ET hours: 8, 10, 12, 14, 16, 18 (every 2h, 8am–6pm)
          case "$et_hour" in
            08|10|12|14|16|18)
              echo "ET is $et_hour:00 — within business window, proceeding."
              echo "run=yes" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "ET is $et_hour — outside business window, skipping."
              echo "run=no" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.et_check.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.et_check.outputs.run == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.et_check.outputs.run == 'yes'
        run: pip install -r requirements.txt

      - name: Run refresh
        if: steps.et_check.outputs.run == 'yes'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
        run: python run.py

      - name: Commit and push refreshed HTML + snapshot
        if: steps.et_check.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.html output/history/
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "auto-refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M ET')"
          # Retry loop to handle concurrent pushes: pull --rebase, then push.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — pulling with rebase and retrying..."
            git pull --rebase --autostash origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
