name: Refresh CoE Dashboard

on:
  # Daily at 12:00 PM EDT (16:00 UTC). Adjust to 17:00 UTC in winter (EST).
  schedule:
    - cron: '0 16 * * 1-5'

  # Manual trigger — used by the Refresh button on the dashboard
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
        run: python run.py

      - name: Commit and push refreshed HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.html
          git diff --staged --quiet || git commit -m "auto-refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
