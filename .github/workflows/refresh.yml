name: Refresh CoE Dashboard

on:
  # Two cron triggers to cover both EDT (summer) and EST (winter).
  # The job checks the actual Eastern Time hour and only proceeds at 12:00 ET.
  schedule:
    - cron: '0 16 * * 1-5'   # 12pm EDT  / 11am EST
    - cron: '0 17 * * 1-5'   # 12pm EST  / 1pm EDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check Eastern Time is 12:00
        id: et_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — proceeding regardless of ET hour."
            echo "run=yes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          et_hour=$(TZ=America/New_York date +%H)
          echo "Current Eastern Time hour: $et_hour"
          if [ "$et_hour" = "12" ]; then
            echo "ET is 12:00 — proceeding with refresh."
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            echo "ET is $et_hour (not 12) — skipping this cron tick."
            echo "run=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.et_check.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.et_check.outputs.run == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.et_check.outputs.run == 'yes'
        run: pip install -r requirements.txt

      - name: Run refresh
        if: steps.et_check.outputs.run == 'yes'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
        run: python run.py

      - name: Commit and push refreshed HTML + snapshot
        if: steps.et_check.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.html output/history/
          git diff --staged --quiet || git commit -m "auto-refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M ET')"
          git push
